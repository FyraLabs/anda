name: Package Git build
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "anda-git.spec"
      - "anda.hcl"
  workflow_dispatch:
jobs:
  anda:
    strategy:
      matrix:
        version: ["f44"]
        arch: ["x86_64", "aarch64"]
      fail-fast: false
    runs-on: ${{ matrix.arch == 'aarch64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    container:
      image: ghcr.io/terrapkg/builder:${{ matrix.version }}
      options: --cap-add=SYS_ADMIN --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Build Anda
        uses: FyraLabs/anda-build@main
        with:
          name: "anda-git"
          mockConfig: terra-44-${{ matrix.arch }}
